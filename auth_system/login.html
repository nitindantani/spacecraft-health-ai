<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ILSA Mission AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

[data-theme="dark"]{
  --bg:#07090d;--card:rgba(13,17,23,.97);--card-border:rgba(255,255,255,.08);
  --title:#e8f4f8;--sub:#3a4a5a;--label:#4a7a99;
  --input-bg:rgba(0,0,0,.4);--input-border:rgba(255,255,255,.1);--input-color:#e8f4f8;
  --tab-bg:rgba(0,0,0,.4);--tab-color:#3a4a5a;
  --footer:#2e404e;--toggle-bg:rgba(0,0,0,.35);--toggle-border:rgba(255,255,255,.12);
  --g-bg:rgba(255,255,255,.04);--g-border:rgba(255,255,255,.15);--g-color:#e8f4f8;
  --divider:rgba(255,255,255,.08);--or-color:#2e404e;
  --msg-err-bg:rgba(255,60,90,.1);--msg-err-border:rgba(255,60,90,.3);--msg-err-color:#ff3c5a;
  --msg-ok-bg:rgba(0,255,157,.08);--msg-ok-border:rgba(0,255,157,.2);--msg-ok-color:#00ff9d;
}
[data-theme="light"]{
  --bg:#f0f4f8;--card:#ffffff;--card-border:rgba(0,0,0,.1);
  --title:#111827;--sub:#6b7280;--label:#374151;
  --input-bg:#f9fafb;--input-border:rgba(0,0,0,.12);--input-color:#111827;
  --tab-bg:#f0f4f8;--tab-color:#9ca3af;
  --footer:#9ca3af;--toggle-bg:rgba(0,0,0,.06);--toggle-border:rgba(0,0,0,.12);
  --g-bg:#ffffff;--g-border:rgba(0,0,0,.15);--g-color:#111827;
  --divider:rgba(0,0,0,.1);--or-color:#9ca3af;
  --msg-err-bg:rgba(255,60,90,.08);--msg-err-border:rgba(255,60,90,.25);--msg-err-color:#cc2233;
  --msg-ok-bg:rgba(0,180,80,.08);--msg-ok-border:rgba(0,180,80,.2);--msg-ok-color:#0a6e34;
}

body{
  background:var(--bg);color:var(--label);
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;transition:background .3s;
}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite alternate;}
@keyframes tw{from{opacity:var(--a)}to{opacity:var(--b)}}
[data-theme="light"] .stars{display:none;}

/* Theme toggle */
.theme-toggle{
  position:fixed;top:14px;right:14px;z-index:100;
  display:flex;align-items:center;
  background:var(--toggle-bg);border:1px solid var(--toggle-border);
  border-radius:20px;padding:3px;gap:2px;
}
.th-opt{
  padding:4px 10px;border-radius:14px;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;
  color:var(--tab-color);cursor:pointer;transition:all .2s;user-select:none;
}
.th-opt.active{background:rgba(0,229,255,.12);color:#00e5ff;}
[data-theme="light"] .th-opt.active{background:rgba(0,140,200,.1);color:#0070a8;}

/* Card */
.wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:20px;}
.card{
  background:var(--card);border:1px solid var(--card-border);
  border-radius:20px;padding:36px 32px;
  box-shadow:0 24px 80px rgba(0,0,0,.4),0 0 0 1px rgba(0,229,255,.04);
  transition:background .3s,border-color .3s;
}
[data-theme="light"] .card{box-shadow:0 8px 40px rgba(0,0,0,.1);}

/* Logo */
.logo{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px;}
.logo-icon{
  width:52px;height:52px;border-radius:13px;
  background:linear-gradient(135deg,#001a22,#002535);
  border:1.5px solid rgba(0,229,255,.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  color:#00e5ff;letter-spacing:1px;
  transition:background .3s,border-color .3s;
}
[data-theme="light"] .logo-icon{background:linear-gradient(135deg,#e6f7ff,#ccefff);border-color:rgba(0,150,210,.4);color:#0070a8;}
.logo-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--title);letter-spacing:-.3px;}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--sub);letter-spacing:3px;}

/* Tabs */
.tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--tab-bg);border-radius:10px;padding:3px;margin-bottom:20px;gap:3px;}
.tab{padding:8px;border-radius:8px;text-align:center;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--tab-color);cursor:pointer;transition:all .2s;}
.tab.active{background:rgba(0,229,255,.1);color:#00e5ff;}
[data-theme="light"] .tab.active{background:rgba(0,140,200,.08);color:#0070a8;}

/* Message */
.msg{font-family:'DM Mono',monospace;font-size:11px;padding:10px 13px;border-radius:8px;display:none;line-height:1.5;margin-bottom:14px;}
.msg.error{background:var(--msg-err-bg);border:1px solid var(--msg-err-border);color:var(--msg-err-color);display:block;}
.msg.success{background:var(--msg-ok-bg);border:1px solid var(--msg-ok-border);color:var(--msg-ok-color);display:block;}

/* Form */
.form{display:flex;flex-direction:column;gap:12px;}
.field label{font-family:'DM Mono',monospace;font-size:9px;color:var(--label);letter-spacing:2px;display:block;margin-bottom:5px;}
.field input{
  width:100%;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:10px;color:var(--input-color);
  font-family:'DM Sans',sans-serif;font-size:13.5px;
  padding:11px 13px;outline:none;transition:border-color .2s,box-shadow .2s;
}
.field input:focus{border-color:rgba(0,229,255,.45);box-shadow:0 0 0 3px rgba(0,229,255,.07);}
[data-theme="light"] .field input:focus{border-color:rgba(0,140,200,.4);box-shadow:0 0 0 3px rgba(0,140,200,.06);}
.field input::placeholder{color:var(--sub);}

/* Google button */
.google-section{margin-bottom:14px;}
.google-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:11px 13px;border-radius:10px;
  border:1px solid var(--g-border);background:var(--g-bg);
  cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  color:var(--g-color);transition:all .2s;
}
.google-btn:hover{background:rgba(255,255,255,.08);}
[data-theme="light"] .google-btn:hover{background:rgba(0,0,0,.04);}
.divider{display:flex;align-items:center;gap:10px;margin:12px 0;}
.divider-line{flex:1;height:1px;background:var(--divider);}
.divider-text{font-family:'DM Mono',monospace;font-size:9px;color:var(--or-color);letter-spacing:1px;}

/* Submit button */
.btn{
  width:100%;background:linear-gradient(135deg,#00b4cc,#00e5ff);
  border:none;border-radius:10px;color:#07090d;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;
  padding:13px;cursor:pointer;transition:all .2s;margin-top:4px;
  box-shadow:0 4px 18px rgba(0,229,255,.22);
}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(0,229,255,.38);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* Footer */
.footer{margin-top:20px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--footer);letter-spacing:1px;line-height:1.9;}

/* Spinner */
.spin{width:14px;height:14px;border-radius:50%;border:2px solid rgba(7,9,13,.25);border-top-color:#07090d;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg)}}

/* Google coming soon badge */
.coming-soon{
  display:inline-block;font-family:'DM Mono',monospace;font-size:8px;
  letter-spacing:1px;padding:2px 7px;border-radius:4px;
  background:rgba(255,184,0,.1);color:#ffb800;
  border:1px solid rgba(255,184,0,.25);vertical-align:middle;margin-left:6px;
}
</style>
</head>
<body>

<!-- Stars (dark mode only) -->
<div class="stars" id="stars"></div>

<!-- Theme toggle -->
<div class="theme-toggle">
  <div class="th-opt active" data-t="dark"  onclick="setTheme('dark')">◑ DARK</div>
  <div class="th-opt"        data-t="light" onclick="setTheme('light')">☀ LIGHT</div>
</div>

<div class="wrap">
  <div class="card">

    <div class="logo">
      <div class="logo-icon">ILSA</div>
      <div class="logo-title">Mission AI</div>
      <div class="logo-sub">CHANDRAYAAN-3 · CH3-ILSA · MONITORING</div>
    </div>

    <div class="tabs">
      <div class="tab active" id="tab-login"    onclick="switchTab('login')">LOGIN</div>
      <div class="tab"        id="tab-register" onclick="switchTab('register')">REGISTER</div>
    </div>

    <div class="msg" id="msg"></div>

    <!-- Google Sign-In (ready for future — hidden until configured) -->
    <div class="google-section" id="googleSection" style="display:none">
      <button class="google-btn" onclick="googleSignIn()">
        <svg width="16" height="16" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">OR</span>
        <div class="divider-line"></div>
      </div>
    </div>

    <!-- LOGIN FORM -->
    <form class="form" id="loginForm" onsubmit="doLogin(event)">
      <div class="field">
        <label>USERNAME</label>
        <input id="l_user" type="text" placeholder="your username" autocomplete="username" required>
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input id="l_pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit" id="loginBtn">LOGIN TO DASHBOARD</button>
    </form>

    <!-- REGISTER FORM -->
    <form class="form" id="registerForm" style="display:none" onsubmit="doRegister(event)">
      <div class="field">
        <label>USERNAME</label>
        <input id="r_user" type="text" placeholder="choose a username" autocomplete="username" required minlength="3">
      </div>
      <div class="field">
        <label>FULL NAME</label>
        <input id="r_name" type="text" placeholder="your full name">
      </div>
      <div class="field">
        <label>EMAIL <span style="opacity:.5">(optional)</span></label>
        <input id="r_email" type="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input id="r_pass" type="password" placeholder="min 6 characters" autocomplete="new-password" required minlength="6">
      </div>
      <div class="field">
        <label>CONFIRM PASSWORD</label>
        <input id="r_pass2" type="password" placeholder="repeat password" required>
      </div>
      <button class="btn" type="submit" id="registerBtn">CREATE ACCOUNT</button>
    </form>

    <div class="footer">
      Chandrayaan-3 ILSA Seismometer · Real-time AI Monitoring<br>
      Copyright &copy; 2024 Nitin Dantani &nbsp;·&nbsp; All Rights Reserved
    </div>

  </div>
</div>

<script>
'use strict';

// ── Stars ──────────────────────────────────────────────────────
(()=>{
  const sf=document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    const z=Math.random()*1.4+.3;
    s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--a:${(Math.random()*.08+.02).toFixed(2)};--b:${(Math.random()*.45+.1).toFixed(2)}`;
    sf.appendChild(s);
  }
})();

// ── Theme ──────────────────────────────────────────────────────
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.th-opt').forEach(e=>{
    e.classList.toggle('active', e.dataset.t===t);
  });
  localStorage.setItem('ilsa_login_theme', t);
}
// Restore saved theme
(()=>{
  const saved=localStorage.getItem('ilsa_login_theme')||'dark';
  setTheme(saved);
})();

// ── Tab switch ─────────────────────────────────────────────────
function switchTab(t){
  const isLogin=t==='login';
  document.getElementById('loginForm').style.display    = isLogin?'flex':'none';
  document.getElementById('registerForm').style.display = isLogin?'none':'flex';
  document.getElementById('tab-login').classList.toggle('active',  isLogin);
  document.getElementById('tab-register').classList.toggle('active',!isLogin);
  showMsg('','');
}

// ── Message ────────────────────────────────────────────────────
function showMsg(type,text){
  const el=document.getElementById('msg');
  el.className='msg'+(type?' '+type:'');
  el.textContent=text;
}

// ── Login ──────────────────────────────────────────────────────
async function doLogin(e){
  e.preventDefault();
  const btn=document.getElementById('loginBtn');
  const user=document.getElementById('l_user').value.trim();
  const pass=document.getElementById('l_pass').value;
  if(!user||!pass)return;
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>LOGGING IN...';
  showMsg('','');
  try{
    const r=await fetch('/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:user,password:pass}),
      credentials:'include',
    });
    const d=await r.json();
    if(!r.ok){showMsg('error',d.detail||'Login failed');return;}
    localStorage.setItem('ilsa_token',   d.token);
    localStorage.setItem('ilsa_username',d.username);
    localStorage.setItem('ilsa_fullname',d.full_name||d.username);
    // Carry theme preference to dashboard
    localStorage.setItem('ilsa_theme', localStorage.getItem('ilsa_login_theme')||'dark');
    showMsg('success',d.message||'Welcome back!');
    setTimeout(()=>window.location.href='/dashboard',500);
  }catch(err){
    showMsg('error','Cannot reach server. Is mission_engine.py running?');
  }finally{
    btn.disabled=false;
    btn.innerHTML='LOGIN TO DASHBOARD';
  }
}

// ── Register ───────────────────────────────────────────────────
async function doRegister(e){
  e.preventDefault();
  const btn=document.getElementById('registerBtn');
  const user =document.getElementById('r_user').value.trim();
  const name =document.getElementById('r_name').value.trim();
  const email=document.getElementById('r_email').value.trim();
  const pass =document.getElementById('r_pass').value;
  const pass2=document.getElementById('r_pass2').value;
  if(pass!==pass2){showMsg('error','Passwords do not match');return;}
  if(pass.length<6){showMsg('error','Password must be at least 6 characters');return;}
  btn.disabled=true;
  btn.innerHTML='<span class="spin"></span>CREATING ACCOUNT...';
  showMsg('','');
  try{
    const r=await fetch('/auth/register',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:user,password:pass,email:email||null,full_name:name||null}),
      credentials:'include',
    });
    const d=await r.json();
    if(!r.ok){showMsg('error',d.detail||'Registration failed');return;}
    localStorage.setItem('ilsa_token',   d.token);
    localStorage.setItem('ilsa_username',d.username);
    localStorage.setItem('ilsa_fullname',d.full_name||d.username);
    localStorage.setItem('ilsa_theme',   localStorage.getItem('ilsa_login_theme')||'dark');
    showMsg('success',d.message||'Account created! Redirecting...');
    setTimeout(()=>window.location.href='/dashboard',500);
  }catch(err){
    showMsg('error','Cannot reach server.');
  }finally{
    btn.disabled=false;
    btn.innerHTML='CREATE ACCOUNT';
  }
}

// ── Google Sign-In (future — wire CLIENT_ID here) ──────────────
// To enable: set GOOGLE_CLIENT_ID in mission_engine.py and show googleSection
function googleSignIn(){
  showMsg('error','Google Sign-In is not configured yet. Use username/password for now.');
}

// ── Already logged in? Redirect ────────────────────────────────
(async()=>{
  const token=localStorage.getItem('ilsa_token');
  if(!token)return;
  try{
    const r=await fetch('/auth/me',{
      headers:{'Authorization':'Bearer '+token},
      credentials:'include',
    });
    if(r.ok)window.location.href='/dashboard';
    else localStorage.removeItem('ilsa_token');
  }catch(e){}
})();
</script>
</body>
</html>
