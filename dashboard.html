<html>
<head>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

</head>

<body>

<h2>Spacecraft Telemetry Dashboard</h2>

<div id="temp_chart"></div>

<script>

let socket = new WebSocket("ws://localhost:8000/telemetry")

let temp_data = []

socket.onmessage = function(event){

    let data = JSON.parse(event.data)

    temp_data.push(data.xTemp)

    Plotly.newPlot("temp_chart",[{

        y: temp_data,
        type: "line"

    }])

}

</script>

</body>
</html>
